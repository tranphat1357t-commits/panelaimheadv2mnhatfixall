<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AimHead V2 - VIP</title>
    <style>
:root {
    --primary-color: 240 100% 50%; 
    --secondary-color: 315 100% 50%; 
    --accent-color: 60 100% 50%; 
    --background-dark: 220 15% 8%; 
    --surface-dark: 220 15% 12%;
    --text-primary: 0 0% 95%; 
    --text-secondary: 0 0% 70%; 
    --glass-bg: 220 15% 15% / 0.1;
    --glass-border: 0 0% 100% / 0.1;
    --glow-color: var(--primary-color);
    --success-color: 120 60% 50%; 
    --warning-color: 45 100% 50%; 
    --error-color: 0 70% 55%; 
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Exo 2', sans-serif;
    background: hsl(var(--background-dark));
    color: hsl(var(--text-primary));
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

#particles-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
}

.menu-container {
    position: relative;
    width: 100%;
    max-width: 480px;
    margin: 2rem auto;
    background: hsla(var(--glass-bg));
    backdrop-filter: blur(20px);
    border: 1px solid hsla(var(--glass-border));
    border-radius: 24px;
    padding: 2rem;
    box-shadow: 
        0 8px 32px hsla(0 0% 0% / 0.3),
        0 0 60px hsla(var(--glow-color) / 0.2);
    animation: menuFadeIn 0.8s ease-out;
    transition: all 0.3s ease;
}

@keyframes menuFadeIn {
    from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.menu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid hsla(var(--glass-border));
}

.title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.title-main {
    background: linear-gradient(45deg, hsl(var(--primary-color)), hsl(var(--secondary-color)));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 30px hsla(var(--glow-color) / 0.5);
    animation: titleGlow 2s ease-in-out infinite alternate;
}

.title-flag {
    font-size: 1.2rem;
    filter: drop-shadow(0 0 10px hsla(var(--accent-color) / 0.8));
}

@keyframes titleGlow {
    from { text-shadow: 0 0 20px hsla(var(--primary-color) / 0.5); }
    to { text-shadow: 0 0 40px hsla(var(--secondary-color) / 0.8); }
}

.header-controls {
    display: flex;
    gap: 0.5rem;
}

.control-btn {
    background: hsla(var(--glass-bg));
    border: 1px solid hsla(var(--glass-border));
    border-radius: 12px;
    padding: 0.75rem;
    color: hsl(var(--text-primary));
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
}

.control-btn:hover {
    background: hsla(var(--primary-color) / 0.2);
    border-color: hsl(var(--primary-color));
    box-shadow: 0 0 20px hsla(var(--primary-color) / 0.3);
    transform: translateY(-2px);
}

.performance-monitor {
    display: flex;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding: 1rem;
    background: hsla(var(--surface-dark) / 0.5);
    border-radius: 16px;
    border: 1px solid hsla(var(--glass-border));
}

.perf-item {
    text-align: center;
    flex: 1;
}

.perf-label {
    display: block;
    font-size: 0.8rem;
    color: hsl(var(--text-secondary));
    margin-bottom: 0.25rem;
}

.perf-value {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 1.1rem;
    color: hsl(var(--success-color));
    text-shadow: 0 0 10px hsla(var(--success-color) / 0.5);
}

.features-section {
    margin-bottom: 2rem;
}

.section-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: hsl(var(--primary-color));
    text-transform: uppercase;
    letter-spacing: 1px;
}

.feature-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem;
    margin-bottom: 0.75rem;
    background: hsla(var(--surface-dark) / 0.3);
    border-radius: 16px;
    border: 1px solid hsla(var(--glass-border));
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.feature-row::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, hsla(var(--primary-color) / 0.1), transparent);
    transition: left 0.5s ease;
}

.feature-row:hover::before {
    left: 100%;
}

.feature-row:hover {
    background: hsla(var(--primary-color) / 0.05);
    border-color: hsl(var(--primary-color));
    box-shadow: 0 4px 20px hsla(var(--primary-color) / 0.2);
    transform: translateY(-2px);
}

.feature-label {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-weight: 500;
    z-index: 1;
}

.feature-label i {
    width: 20px;
    color: hsl(var(--primary-color));
    text-shadow: 0 0 10px hsla(var(--primary-color) / 0.5);
}

.toggle-switch {
    position: relative;
    z-index: 1;
}

.toggle-input {
    display: none;
}

.toggle-label {
    display: block;
    width: 60px;
    height: 30px;
    background: hsla(var(--surface-dark) / 0.8);
    border-radius: 30px;
    border: 2px solid hsla(var(--glass-border));
    cursor: pointer;
    position: relative;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
}

.toggle-label::before {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 22px;
    height: 22px;
    background: hsl(var(--text-primary));
    border-radius: 50%;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px hsla(0 0% 0% / 0.3);
}

.toggle-input:checked + .toggle-label {
    background: linear-gradient(45deg, hsl(var(--primary-color)), hsl(var(--secondary-color)));
    border-color: hsl(var(--primary-color));
    box-shadow: 0 0 20px hsla(var(--primary-color) / 0.5);
}

.toggle-input:checked + .toggle-label::before {
    transform: translateX(30px);
    background: hsl(0 0% 100%);
    box-shadow: 0 0 15px hsla(var(--primary-color) / 0.8);
}

.audio-controls {
    margin-bottom: 2rem;
}

.audio-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
    background: hsla(var(--surface-dark) / 0.3);
    border-radius: 16px;
    border: 1px solid hsla(var(--glass-border));
}

.audio-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: linear-gradient(45deg, hsl(var(--primary-color)), hsl(var(--secondary-color)));
    border: none;
    border-radius: 12px;
    padding: 0.75rem 1.5rem;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px hsla(var(--primary-color) / 0.3);
}

.audio-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px hsla(var(--primary-color) / 0.4);
}

.audio-btn:active {
    transform: translateY(0);
}

.volume-control {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex: 1;
}

.volume-slider {
    flex: 1;
    height: 6px;
    background: hsla(var(--surface-dark) / 0.8);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
}

.volume-slider::-webkit-slider-thumb {
    appearance: none;
    width: 18px;
    height: 18px;
    background: linear-gradient(45deg, hsl(var(--primary-color)), hsl(var(--secondary-color)));
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px hsla(var(--primary-color) / 0.5);
}

.volume-slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    background: linear-gradient(45deg, hsl(var(--primary-color)), hsl(var(--secondary-color)));
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 10px hsla(var(--primary-color) / 0.5);
}

.action-buttons {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
}

.action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    flex: 1;
    background: hsla(var(--glass-bg));
    border: 1px solid hsla(var(--glass-border));
    border-radius: 12px;
    padding: 1rem;
    color: hsl(var(--text-primary));
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
}

.action-btn:hover {
    background: hsla(var(--primary-color) / 0.2);
    border-color: hsl(var(--primary-color));
    box-shadow: 0 4px 20px hsla(var(--primary-color) / 0.3);
    transform: translateY(-2px);
}

.settings-panel {
    position: fixed;
    top: 0;
    right: -400px;
    width: 400px;
    height: 100vh;
    background: hsla(var(--glass-bg));
    backdrop-filter: blur(20px);
    border-left: 1px solid hsla(var(--glass-border));
    padding: 2rem;
    transition: right 0.3s ease;
    z-index: 1000;
}

.settings-panel.active {
    right: 0;
}

.settings-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid hsla(var(--glass-border));
}

.settings-header h3 {
    font-family: 'Orbitron', monospace;
    color: hsl(var(--primary-color));
}

.close-btn {
    background: none;
    border: none;
    color: hsl(var(--text-primary));
    font-size: 1.2rem;
    cursor: pointer;
    padding: 0.5rem;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.close-btn:hover {
    background: hsla(var(--error-color) / 0.2);
    color: hsl(var(--error-color));
}

.setting-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: hsla(var(--surface-dark) / 0.3);
    border-radius: 12px;
    border: 1px solid hsla(var(--glass-border));
}

.setting-select {
    background: hsla(var(--surface-dark) / 0.8);
    border: 1px solid hsla(var(--glass-border));
    border-radius: 8px;
    padding: 0.5rem;
    color: hsl(var(--text-primary));
    min-width: 120px;
}

.setting-slider {
    width: 120px;
    height: 6px;
    background: hsla(var(--surface-dark) / 0.8);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
}

.target-display {
    position: relative;
    width: 100%;
    height: 220px;

    display: flex;
    justify-content: center;
    align-items: flex-start;

    margin: -10px 0 25px 0;
    z-index: 10;
}

.human-silhouette {
    position: relative;
    width: 110px;
    height: 220px;

    background-image: url('data:image/svg+xml,\
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 240">\
<g fill="none" stroke="%23d1d5db" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">\
<circle cx="60" cy="28" r="14"/>\
<path d="M60 42 L60 72"/>\
<path d="M40 58 Q60 48 80 58"/>\
<path d="M48 72 L48 118"/>\
<path d="M72 72 L72 118"/>\
<path d="M48 118 Q60 126 72 118"/>\
<path d="M40 70 Q30 95 34 145"/>\
<path d="M80 70 Q90 95 86 145"/>\
<path d="M56 126 Q50 175 54 225"/>\
<path d="M64 126 Q70 175 66 225"/>\
</g></svg>');

    background-size: contain;
    background-repeat: no-repeat;
    background-position: center top;

    filter: drop-shadow(0 0 10px rgba(255,255,255,0.15));
}

/* DOT */

.target-dot {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #ff3b3b;
    border-radius: 50%;
    display: none;

    box-shadow:
        0 0 8px rgba(255,0,0,0.8),
        0 0 20px rgba(255,0,0,0.5);

    animation: targetPulse 1s infinite;

    transform: translate(-50%, -50%);
}

.target-dot.active {
    display: block;
}

@keyframes targetPulse {
    0%,100%{
        transform: translate(-50%, -50%) scale(1);
        opacity:1;
    }

    50%{
        transform: translate(-50%, -50%) scale(1.35);
        opacity:.7;
    }
}

/* VỊ TRÍ DOT */

.head-dot {
    top: 28px;
    left: 55px;
}

.shoulder-dot {
    top: 63px;
    left: 72px;
}

.arm-left-dot {
    top: 102px;
    left: 35px;
}

.arm-right-dot {
    top: 102px;
    left: 92px;
}

.torso-dot {
    top: 138px;
    left: 60px;
}

.leg-left-dot {
    top: 202px;
    left: 50px;
}

.leg-right-dot {
    top: 202px;
    left: 70px;
}

.target-dot.active {
    display: block;
}

.notification-container {
    position: fixed;
    top: 2rem;
    right: 2rem;
    z-index: 1001;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.notification {
    background: hsla(var(--glass-bg));
    backdrop-filter: blur(20px);
    border: 1px solid hsla(var(--glass-border));
    border-radius: 12px;
    padding: 1rem 1.5rem;
    color: hsl(var(--text-primary));
    box-shadow: 0 4px 20px hsla(0 0% 0% / 0.3);
    animation: notificationSlide 0.3s ease-out;
    max-width: 300px;
}

@keyframes notificationSlide {
    from {
        opacity: 0;
        transform: translateX(100px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

.notification.success {
    border-color: hsl(var(--success-color));
    box-shadow: 0 4px 20px hsla(var(--success-color) / 0.3);
}

.notification.warning {
    border-color: hsl(var(--warning-color));
    box-shadow: 0 4px 20px hsla(var(--warning-color) / 0.3);
}

.notification.error {
    border-color: hsl(var(--error-color));
    box-shadow: 0 4px 20px hsla(var(--error-color) / 0.3);
}

@media (max-width: 768px) {
    .target-display {
        display: flex;
    }

    .human-silhouette {
        width: 90px;
        height: 180px;
    }
}

    
    .title {
        font-size: 1.4rem;
    }
    
    .performance-monitor {
        flex-direction: column;
        gap: 0.5rem;
    }
    
    .perf-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-align: left;
    }
    
    .settings-panel {
        width: 100vw;
        right: -100vw;
    }
    
    .target-display {
        display: none;
    }
    
    .action-buttons {
        flex-direction: column;
    }
    
    .audio-row {
        flex-direction: column;
        gap: 1rem;
    }
    
    .volume-control {
        width: 100%;
    }
}

@media (max-width: 480px) {
    .menu-container {
        margin: 0.5rem;
        padding: 1rem;
    }
    
    .title {
        font-size: 1.2rem;
    }
    
    .feature-row {
        padding: 0.75rem;
    }
    
    .notification {
        max-width: calc(100vw - 4rem);
    }
}

.theme-blue {
    --primary-color: 210 100% 60%;
    --secondary-color: 240 100% 70%;
}

.theme-green {
    --primary-color: 120 100% 50%;
    --secondary-color: 150 100% 60%;
}

.theme-purple {
    --primary-color: 270 100% 60%;
    --secondary-color: 300 100% 70%;
}

::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: hsla(var(--surface-dark) / 0.5);
    border-radius: 4px;
}

::-webkit-scrollbar-thumb {
    background: hsl(var(--primary-color));
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: hsl(var(--secondary-color));
}
</style>

                    applyConfiguration(config);

            reader.readAsText(file);
        }
    };

function applyConfiguration(config) {

            setTimeout(() => {

function getNotificationIcon(type) {
    switch (type) {

function setupEventListeners() {

        <div class="elite-row">
            <input
                id="deviceId"
                class="elite-input"
                readonly
            >

            <button id="copyBtn" class="elite-btn gray">
                COPY
            </button>
        </div>

        <div style="height:10px"></div>

        <div class="elite-row">
            <button id="checkBtn" class="elite-btn">
                CHECK
            </button>

            <button id="activeBtn" class="elite-btn">
                MỞ
            </button>
        </div>

        <div style="height:8px"></div>

        <button id="resetBtn" class="elite-btn red" style="width:100%">
            RESET
        </button>

        <div class="elite-info">
            UID:
            <span id="uid"></span>
            <br>

            DEVICE:
            <span id="device"></span>
        </div>

        <div id="status" class="elite-status">
            Đang chờ kích hoạt...
        </div>

        <div id="time" class="elite-time"></div>

    </div>
</div>
`;

  document.body.appendChild(overlay);

  document.body.style.overflow = "hidden";

  // ===== SET INFO =====

  const deviceId = getDeviceId();

  document.getElementById("deviceId").value = deviceId;

  document.getElementById("uid").innerText = deviceId;

  document.getElementById("device").innerText = getDevice();
  

  // ===== CLOCK =====

  setInterval(() => {
    document.getElementById("time").innerText = getTime();
  }, 1000);

  // ===== API =====

  async function verifyKey(key) {

    const res = await fetch(API_URL + "/api/verify", {
      method: "POST",

      headers: {
        "Content-Type": "application/json",
      },

      body: JSON.stringify({
        key,
        deviceId,
      }),
    });

    return res.json();
  }

  async function activateKey(key) {

    const res = await fetch(API_URL + "/api/activate", {
      method: "POST",

      headers: {
        "Content-Type": "application/json",
      },

      body: JSON.stringify({
        key,
        deviceId,
      }),
    });

    return res.json();
  }

  // ===== ELEMENT =====

  const status = document.getElementById("status");

  // ===== PASTE =====

  document.getElementById("pasteBtn").onclick = async () => {

    try{

      const text = await navigator.clipboard.readText();

      document.getElementById("keyInput").value = text;

    }catch{

      status.innerText = "❌ Không thể dán";

    }
  };

  // ===== COPY UID =====

  document.getElementById("copyBtn").onclick = () => {

    navigator.clipboard.writeText(deviceId);

    status.innerText = "📋 Đã copy UID";
  };

  // ===== RESET =====

  document.getElementById("resetBtn").onclick = () => {

    localStorage.removeItem("vip_key");

    location.reload();
  };

  // ===== CHECK =====

  document.getElementById("checkBtn").onclick = async () => {

    const key =
      document.getElementById("keyInput").value.trim();

    if (!key) {

      status.innerText = "❌ Nhập key";

      return;
    }

    status.innerText = "⏳ Đang kiểm tra...";

    try {

      const res = await verifyKey(key);

      if (res.ok) {

        status.innerText = "✅ Key hợp lệ";

      } else {

        status.innerText =
          "❌ " + (res.error || "Key lỗi");
      }

    } catch {

      status.innerText = "❌ Lỗi kết nối";
    }
  };

  // ===== ACTIVE =====

  document.getElementById("activeBtn").onclick = async () => {

    const key =
      document.getElementById("keyInput").value.trim();

    if (!key) {

      status.innerText = "❌ Nhập key";

      return;
    }

    status.innerText = "⚡ Đang kích hoạt...";

    try {

      const res = await activateKey(key);

      if (res.ok) {

        localStorage.setItem("vip_key", key);

        status.innerText = "✅ Kích hoạt thành công";

        setTimeout(() => {

          document.getElementById("eliteUI").remove();

          document.body.style.overflow = "auto";

        }, 1000);

      } else {

        status.innerText =
          "❌ " + (res.error || "Kích hoạt lỗi");
      }

    } catch {

      status.innerText = "❌ Không thể kết nối API";
    }
  };

  // ===== AUTO LOGIN =====

  (async () => {

    const key = localStorage.getItem("vip_key");

    if (!key) return;

    try {

      const res = await verifyKey(key);

      if (res.ok) {

        document.getElementById("eliteUI").remove();

        document.body.style.overflow = "auto";
      }

    } catch {}
  })();

})();

</script>
<script>
function startParticles() {
    console.log("Particles ON");
}

function stopParticles() {
    console.log("Particles OFF");
}
</script>
</body>
